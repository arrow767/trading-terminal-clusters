# clusters.lootx.trade — TLS terminator (origin behind the Cloudflare proxy).
#
# Public TLS:443 is terminated at the Cloudflare edge (orange-cloud). Cloudflare
# connects to THIS origin over TLS:443 and we reverse-proxy to the local
# cluster-ingest REST on 127.0.0.1:8080. The origin cert is a long-lived
# self-signed pair (Cloudflare SSL/TLS mode "Full" does not validate it); the
# origin is additionally firewalled to Cloudflare IP ranges (see
# cloudflare-tls-setup.sh) so only the CF edge can reach :443.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name clusters.lootx.trade;

    ssl_certificate     /etc/ssl/clusters/origin.pem;
    ssl_certificate_key /etc/ssl/clusters/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Cluster-range responses are a few MB pre-gzip — stream straight through.
    proxy_buffering off;
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }
}
